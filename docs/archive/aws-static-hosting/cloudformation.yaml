AWSTemplateFormatVersion: "2010-09-09"
Description: NFC Card Designer — S3 static site with CloudFront, ACM, and Route53

# Deploy this stack in us-east-1 (required for CloudFront ACM certificates).

Parameters:
  DomainName:
    Type: String
    Default: nfc-card-designer.therealbenforce.com
    Description: Full hostname for the site (also used as the S3 bucket name)
  HostedZoneId:
    Type: String
    Description: Route53 hosted zone ID for the parent domain (e.g. therealbenforce.com)
  DeployUserName:
    Type: String
    Default: nfc-card-designer-github-deploy
    Description: IAM user for GitHub Actions deploy and workstation fetch-images uploads
  CreateDeployAccessKey:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Create an access key for the deploy user (secret shown once in stack outputs)

Conditions:
  CreateDeployAccessKey: !Equals [!Ref CreateDeployAccessKey, "true"]

Resources:
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref DomainName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Project
          Value: nfc-card-designer

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontServicePrincipalReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"
          - Sid: AllowAccountPrincipalsListBucket
            Effect: Allow
            Principal: "*"
            Action:
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource: !GetAtt SiteBucket.Arn
            Condition:
              StringEquals:
                aws:PrincipalAccount: !Ref AWS::AccountId
          - Sid: AllowAccountPrincipalsObjectReadWrite
            Effect: Allow
            Principal: "*"
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:AbortMultipartUpload
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                aws:PrincipalAccount: !Ref AWS::AccountId

  SiteCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        Description: OAC for NFC Card Designer bucket
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  RouteRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "${AWS::StackName}-route-rewrite"
      AutoPublish: true
      FunctionConfig:
        Comment: Rewrite extensionless paths to route index documents
        Runtime: cloudfront-js-1.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri || "/";

          if (uri.endsWith("/")) {
            request.uri = uri + "index.html";
            return request;
          }

          if (uri.indexOf(".") === -1) {
            request.uri = uri + "/index.html";
          }

          return request;
        }

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "NFC Card Designer (${DomainName})"
        HttpVersion: http2and3
        DefaultRootObject: index.html
        Aliases:
          - !Ref DomainName
        ViewerCertificate:
          AcmCertificateArn: !Ref SiteCertificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: SiteBucketOrigin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: SiteBucketOrigin
          ViewerProtocolPolicy: redirect-to-https
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt RouteRewriteFunction.FunctionARN
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        PriceClass: PriceClass_100

  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  DnsRecordAAAA:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  DeployUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Ref DeployUserName
      Tags:
        - Key: Project
          Value: nfc-card-designer
        - Key: Purpose
          Value: github-actions-deploy

  DeployUserPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${AWS::StackName}-site-deploy"
      Users:
        - !Ref DeployUser
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: ListSiteBucket
            Effect: Allow
            Action:
              - s3:ListBucket
            Resource: !GetAtt SiteBucket.Arn
          - Sid: ReadWriteSiteObjects
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource: !Sub "${SiteBucket.Arn}/*"
          - Sid: InvalidateCloudFront
            Effect: Allow
            Action:
              - cloudfront:CreateInvalidation
            Resource: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  DeployUserAccessKey:
    Type: AWS::IAM::AccessKey
    Condition: CreateDeployAccessKey
    Properties:
      UserName: !Ref DeployUser

Outputs:
  BucketName:
    Description: S3 bucket for site assets and game images
    Value: !Ref SiteBucket
    Export:
      Name: !Sub "${AWS::StackName}-BucketName"
  DistributionId:
    Description: CloudFront distribution ID (for cache invalidation)
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub "${AWS::StackName}-DistributionId"
  DistributionDomainName:
    Description: CloudFront domain name
    Value: !GetAtt CloudFrontDistribution.DomainName
  SiteURL:
    Description: Public site URL
    Value: !Sub "https://${DomainName}"
  CertificateArn:
    Description: ACM certificate ARN
    Value: !Ref SiteCertificate
  DeployUserName:
    Description: IAM user for GitHub Actions and workstation S3 uploads
    Value: !Ref DeployUser
  DeployUserAccessKeyId:
    Condition: CreateDeployAccessKey
    Description: Access key ID for GitHub secret AWS_ACCESS_KEY_ID
    Value: !Ref DeployUserAccessKey
  DeployUserSecretAccessKey:
    Condition: CreateDeployAccessKey
    Description: Secret access key for GitHub secret AWS_SECRET_ACCESS_KEY (copy now — shown once)
    Value: !GetAtt DeployUserAccessKey.SecretAccessKey
