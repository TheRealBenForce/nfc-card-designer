<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NFC Card Designer</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <header class="header">
      <h1>NFC Card Designer</h1>
      <p class="header__subtitle">52 × 84 mm Zaparoo labels · Letter sticker sheets</p>
    </header>

    <div class="app">
      <aside class="panel panel--controls">
        <section class="section">
          <h2 class="section__title">Platform</h2>
          <input
            id="platform-search"
            class="input"
            type="search"
            placeholder="Search platforms…"
            autocomplete="off"
          />
          <div id="platform-results" class="list" role="listbox" aria-label="Platforms"></div>
          <label class="field">
            <span class="field__label">Platform color</span>
            <input id="platform-color" class="input input--color" type="color" />
          </label>
        </section>

        <section class="section">
          <h2 class="section__title">Game</h2>
          <label class="field">
            <span class="field__label">Artwork type</span>
            <select id="image-type" class="input"></select>
          </label>
          <input
            id="game-search"
            class="input"
            type="text"
            placeholder="Search games… (Enter to add)"
            autocomplete="off"
          />
          <div id="game-results" class="list list--games" role="listbox" aria-label="Games"></div>
        </section>

        <section class="section section--actions">
          <div class="button-row">
            <button id="export-settings" type="button" class="btn btn--secondary">Export settings</button>
            <button id="import-settings" type="button" class="btn btn--secondary">Import settings</button>
          </div>
          <button id="export-pdf" type="button" class="btn btn--primary">Download PDF sheet</button>
          <button id="clear-deck" type="button" class="btn btn--ghost">Clear deck</button>
        </section>
      </aside>

      <section class="panel panel--preview">
        <h2 class="section__title">Preview</h2>
        <p id="preview-meta" class="preview-meta">Select or add a card to preview.</p>
        <div class="preview-frame">
          <img id="preview-image" class="preview-image" alt="" />
        </div>
        <p class="preview-dimensions">52 mm × 84 mm</p>
      </section>

      <aside class="panel panel--deck">
        <h2 class="section__title">Deck <span class="deck-hint">↑↓ to browse</span></h2>
        <div id="deck-list" class="deck-list"></div>
      </aside>
    </div>

    <footer id="status" class="status" role="status"></footer>

    <script type="module" src="assets/js/main.js"></script>
  </body>
</html>
