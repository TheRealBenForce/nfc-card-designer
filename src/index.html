<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NFC Card Designer</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon-gamepad.svg" />
    <link rel="alternate icon" href="assets/images/favicon-gamepad.svg" />
    <script src="assets/js/theme.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <header class="header">
      <nav class="header__nav" aria-label="Site">
        <h1 class="header__title">
          <a class="header__brand wordmark" href="./">NFC Card Maker</a>
        </h1>
        <div class="header__links">
          <a class="header__link" href="supplies.html">Supplies</a>
          <a class="header__link" href="recognition.html">Recognition</a>
        </div>
        <button id="theme-toggle" type="button" class="theme-toggle" aria-label="Switch to dark mode">
          <svg
            class="theme-toggle__icon theme-toggle__icon--moon"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            aria-hidden="true"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
          </svg>
          <svg
            class="theme-toggle__icon theme-toggle__icon--sun"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            aria-hidden="true"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2" />
            <path d="M12 20v2" />
            <path d="M4.93 4.93l1.41 1.41" />
            <path d="M17.66 17.66l1.41 1.41" />
            <path d="M2 12h2" />
            <path d="M20 12h2" />
            <path d="M4.93 19.07l1.41-1.41" />
            <path d="M17.66 6.34l1.41-1.41" />
          </svg>
        </button>
      </nav>
    </header>

    <div class="app">
      <aside class="panel panel--select">
        <details class="collapsible">
          <summary class="collapsible__summary">Global Settings</summary>
          <div class="collapsible__body">
            <label class="field">
              <span class="field__label">Platform Icons (UI)</span>
              <select id="global-platform-icon-theme" class="input">
                <option value="dot-art">Dot Art</option>
                <option value="flatui">FlatUI</option>
                <option value="flatux">FlatUX</option>
                <option value="monochrome">Monochrome</option>
                <option value="pixel">Pixel</option>
                <option value="retrosystem">RetroSystem</option>
                <option value="systematic">Systematic</option>
                <option value="daite">Daite</option>
                <option value="automatic">Automatic</option>
              </select>
            </label>
            <div class="dimension-grid" role="group" aria-label="Card and sticker sizing">
              <label class="field dimension-field">
                <span class="field__label">Card Width (mm)</span>
                <input
                  id="global-card-width"
                  class="input"
                  type="number"
                  min="20"
                  max="120"
                  step="0.1"
                  value="52"
                />
              </label>
              <label class="field dimension-field">
                <span class="field__label">Card Height (mm)</span>
                <input
                  id="global-card-height"
                  class="input"
                  type="number"
                  min="20"
                  max="180"
                  step="0.1"
                  value="84"
                />
              </label>
              <label class="field dimension-field">
                <span class="field__label">Sticker Inset (mm)</span>
                <input
                  id="global-sticker-inset"
                  class="input"
                  type="number"
                  min="0"
                  max="20"
                  step="0.1"
                  value="2"
                />
              </label>
            </div>
          </div>
        </details>

        <section class="section section--platforms">
          <div id="platform-results" class="list list--platforms" role="listbox" aria-label="Platforms"></div>
        </section>

        <section class="section section--game-search">
          <div class="game-search-anchor">
            <div class="search-field">
              <input
                id="game-search"
                class="input search-field__input"
                type="search"
                placeholder="Search games..."
                autocomplete="off"
                aria-autocomplete="list"
                aria-controls="game-results"
              />
              <svg
                class="search-field__icon"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                aria-hidden="true"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="11" cy="11" r="7" />
                <path d="m20 20-3.5-3.5" />
              </svg>
            </div>
            <div id="game-results" class="list list--games game-search-dropdown" role="listbox" aria-label="Games" hidden></div>
          </div>
          <p id="game-search-hint" class="field-hint">Select a platform to search retail releases.</p>
        </section>
        <section class="section section--actions">
          <div class="button-row">
            <button id="export-project" type="button" class="btn btn--secondary">Export</button>
            <button id="import-project" type="button" class="btn btn--secondary">Import</button>
            <button id="clear-project" type="button" class="btn btn--secondary">Clear</button>
          </div>
        </section>
      </aside>

      <section class="panel panel--edit panel--edit-off" id="edit-panel" aria-disabled="true">
        <div id="edit-controls" class="preview-layout edit-controls--idle">
          <div class="preview-layout__workspace">
            <div id="edit-gated-region" class="edit-gated-region">
              <div class="preview-main">
                <p id="preview-meta-game" class="preview-meta-game">Select a game to start editing.</p>
                <div
                  id="preview-type-tabs"
                  class="preview-type-tabs preview-layout__tabs"
                  role="tablist"
                  aria-label="Artwork type"
                ></div>
                <div id="preview-frame" class="preview-frame preview-mat preview-frame--idle">
                  <div class="preview-stage">
                    <div id="preview-card" class="preview-card">
                      <div id="preview-sticker-base" class="preview-sticker-base" aria-hidden="true"></div>
                      <div id="preview-skeleton" class="preview-skeleton" aria-hidden="false"></div>
                      <img id="preview-image" class="preview-image" alt="" hidden />
                    </div>
                  </div>
                </div>
              </div>
              <aside id="preview-artwork-controls" class="preview-artwork-controls">
            <div class="edit-control-group">
              <label class="field field--compact">
                <span class="field__label">Accent color</span>
                <input id="preview-platform-color" class="input input--color" type="color" value="#000000" aria-label="Platform accent color" />
              </label>
              <div
                id="preview-artwork-alignment-grid"
                class="alignment-grid"
                role="radiogroup"
                aria-label="Card artwork alignment override"
              ></div>
              <div class="artwork-zoom-section">
                <div class="artwork-actions-row">
                  <label for="preview-artwork-zoom" class="artwork-zoom-field artwork-zoom-field--inline">
                    <input
                      id="preview-artwork-zoom"
                      class="artwork-zoom-field__range"
                      type="range"
                      min="50"
                      max="200"
                      step="1"
                      value="100"
                      aria-label="Artwork zoom"
                    />
                    <span id="preview-artwork-zoom-value" class="artwork-zoom-field__value" hidden>100%</span>
                  </label>
                  <button
                    id="preview-artwork-rotate"
                    type="button"
                    class="alignment-rotate-btn alignment-rotate-btn--inline"
                    title="Rotate artwork 90°"
                    aria-label="Rotate artwork 90 degrees"
                  >
                    <svg
                      width="22"
                      height="22"
                      viewBox="0 0 24 24"
                      aria-hidden="true"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <path d="M21 12a9 9 0 1 1-3-6.7" />
                      <polyline points="21 3 21 9 15 9" />
                    </svg>
                  </button>
                </div>
              </div>
              <div class="artwork-background-section">
                <h3 class="edit-control-group__title">Artwork background</h3>
                <div class="artwork-background-row">
                  <select id="preview-artwork-background-mode" class="input artwork-background-row__mode"></select>
                  <input
                    id="preview-artwork-background-color"
                    class="input input--color artwork-background-row__color"
                    type="color"
                    value="#000000"
                    aria-label="Background color"
                  />
                </div>
              </div>
              <div class="header-design-fields" role="group" aria-label="Header design controls">
                <label class="field field--checkbox">
                  <input id="preview-show-header" type="checkbox" checked />
                  <span class="field__label field__label--inline">Show Header</span>
                </label>
                <label class="field field--checkbox">
                  <input id="preview-show-platform-color" type="checkbox" checked />
                  <span class="field__label field__label--inline">Show Platform Accents</span>
                </label>
                <label for="preview-header-height" class="artwork-zoom-field artwork-zoom-field--compact">
                  <span class="artwork-zoom-field__label">Header Height</span>
                  <input
                    id="preview-header-height"
                    class="artwork-zoom-field__range"
                    type="range"
                    min="5"
                    max="40"
                    step="1"
                    value="15"
                    aria-label="Header height percent"
                  />
                  <span id="preview-header-height-value" class="artwork-zoom-field__value">15%</span>
                </label>
              </div>
              <div class="platform-default-actions">
                <button id="preview-artwork-reset" type="button" class="btn btn--secondary preview-artwork-reset">
                  Reset card
                </button>
                <button id="save-platform-defaults" type="button" class="btn btn--secondary">
                  Save to platform defaults
                </button>
              </div>
            </div>
            <button id="add-browsed-game" type="button" class="btn btn--primary preview-add-btn" disabled>
              Add to collection
            </button>
              </aside>
            </div>
            <div class="preview-calibration-panel">
              <label
                for="preview-calibration-input"
                class="preview-calibration"
                title="Hold up your NFC card and scale to size."
              >
                <input
                  id="preview-calibration-input"
                  class="preview-calibration__range"
                  type="range"
                  min="50"
                  max="100"
                  step="1"
                  value="50"
                  aria-label="Card scale"
                />
              </label>
            </div>
          </div>
        </div>
      </section>

      <aside class="panel panel--print" id="print-panel">
        <p id="collection-selection-meta" class="collection-meta">No cards selected</p>
        <div class="print-toolbar">
          <div class="collection-actions">
            <button id="select-all" type="button" class="btn btn--secondary" disabled>Select All</button>
            <button id="deselect-all" type="button" class="btn btn--secondary" disabled>Deselect All</button>
          </div>
          <div class="collection-actions collection-actions--primary">
            <button id="print-selected" type="button" class="btn btn--primary" disabled>Print PDF</button>
            <button id="delete-selected" type="button" class="btn btn--danger" disabled>Delete Selected</button>
          </div>
        </div>
        <div id="collection-list" class="collection-list"></div>
      </aside>
    </div>

    <dialog
      id="collection-browser"
      class="collection-browser"
      aria-labelledby="collection-browser-title"
    >
      <div class="collection-browser__sheet">
        <header class="collection-browser__header">
          <div class="collection-browser__heading">
            <span id="collection-browser-icon" class="collection-browser__icon-slot" aria-hidden="true"></span>
            <div class="collection-browser__titles">
              <h2 id="collection-browser-title" class="collection-browser__title">Platform</h2>
              <p id="collection-browser-position" class="collection-browser__position">1 of 1</p>
            </div>
          </div>
          <button
            id="collection-browser-close"
            type="button"
            class="collection-browser__close"
            aria-label="Close"
          >
            <span aria-hidden="true">×</span>
          </button>
        </header>

        <div
          id="collection-browser-carousel"
          class="collection-browser__carousel"
          tabindex="0"
          role="region"
          aria-label="Collection cards"
        ></div>

        <footer class="collection-browser__footer">
          <button id="collection-browser-prev" type="button" class="collection-browser__nav-btn" aria-label="Previous card">
            <span class="collection-browser__nav-label collection-browser__nav-label--prev">Previous</span>
          </button>
          <button id="collection-browser-next" type="button" class="collection-browser__nav-btn" aria-label="Next card">
            <span class="collection-browser__nav-label collection-browser__nav-label--next">Next</span>
          </button>
        </footer>
      </div>
    </dialog>

    <dialog
      id="confirm-modal"
      class="platform-settings-modal confirm-modal"
      aria-labelledby="confirm-modal-title"
      aria-describedby="confirm-modal-message"
    >
      <div class="platform-settings-modal__panel">
        <div class="platform-settings-modal__accent" aria-hidden="true"></div>
        <header class="platform-settings-modal__header">
          <div class="platform-settings-modal__heading">
            <h2 id="confirm-modal-title" class="platform-settings-modal__title">Confirm</h2>
          </div>
          <button id="confirm-modal-close" type="button" class="platform-settings-modal__close" aria-label="Close">
            <span aria-hidden="true">×</span>
          </button>
        </header>
        <div class="platform-settings-modal__body">
          <p id="confirm-modal-message" class="confirm-modal__message"></p>
        </div>
        <footer class="platform-settings-modal__footer">
          <button id="confirm-modal-cancel" type="button" class="btn btn--secondary">Cancel</button>
          <button id="confirm-modal-confirm" type="button" class="btn btn--danger">Confirm</button>
        </footer>
      </div>
    </dialog>

    <script type="module" src="assets/js/main.js"></script>
  </body>
</html>
